function scramble(word) {
  const arr = word.split("");
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr.join("") === word ? scramble(word) : arr.join("");

          gg.gain.setValueAtTime(0.13,t+i*0.12); gg.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.3);
          oo.start(t+i*0.12); oo.stop(t+i*0.12+0.3);
        });
      }
    } catch(e) {}
  }, []);
}

// ─── CONFETTI ─────────────────────────────────────────────────────────────────
function Confetti({ gold }) {
  const colors = gold ? ["#facc15","#fde68a","#fbbf24","#f59e0b","#fff"] : COLORS;
  const pieces = useRef(Array.from({length:35},(_,i)=>({
    id:i, color:colors[i%colors.length],
    left:`${Math.random()*100}%`,
    delay:`${Math.random()*0.7}s`,
    size:`${7+Math.random()*8}px`,
  }))).current;
  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:999,overflow:"hidden"}}>
      {pieces.map(p=>(
        <div key={p.id} style={{position:"absolute",top:"-20px",left:p.left,width:p.size,height:p.size,background:p.color,borderRadius:"3px",animation:`confettiFall 1.5s ${p.delay} ease-in forwards`}}/>
      ))}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const play = useSound();

  const gsRef = useRef({
    lives: 3, score: 0,
    levelIdx: 0, wordIdx: 0,
    timeLeft: TIMER, hintVisible: false,
    flash: null, running: false,
    scrambledWord: "",
  });

  const [screen, setScreen] = useState("menu"); // menu|game|levelcomplete|gameover|win
  const [tick, setTick] = useState(0);
  const [input, setInput] = useState("");
  const [shake, setShake] = useState(false);
  const [showConfetti, setShowConfetti] = useState(false);
  const [showLeaderboard, setShowLeaderboard] = useState(false);
  const [scores, setScores] = useState([]);
  const [scoresLoading, setScoresLoading] = useState(false);
  const [playerName, setPlayerName] = useState("");
  const [scoreSaved, setScoreSaved] = useState(false);

  const timerRef = useRef(null);
  const nextWordRef = useRef(null);
  const rerender = () => setTick(n=>n+1);

  const stopTimer = useCallback(() => {
    if (timerRef.current) { clearInterval(timerRef.current); timerRef.current=null; }
  }, []);

  const startTimer = useCallback(() => {
    stopTimer();
    timerRef.current = setInterval(() => {
      const g = gsRef.current;
      if (!g.running) return;
      const step = g.hintVisible ? 2 : 1;
      const next = g.timeLeft - step;
      if (next<=5 && next>0) play("tick");
      if (next<=0) {
        g.timeLeft=0; g.running=false; g.flash="timeout"; g.lives-=1;
        stopTimer(); play("wrong"); rerender();
        if (g.lives<=0) { play("gameover"); setTimeout(()=>setScreen("gameover"),900); }
        else { setTimeout(()=>nextWordRef.current&&nextWordRef.current(),1200); }
      } else { g.timeLeft=next; rerender(); }
    }, 1000);
  }, [play, stopTimer]);

  const loadWord = useCallback((levelIdx, wordIdx) => {
    const g = gsRef.current;
    const word = LEVELS[levelIdx].words[wordIdx].word;
    g.levelIdx=levelIdx; g.wordIdx=wordIdx;
    g.timeLeft=TIMER; g.hintVisible=false; g.flash=null; g.running=true;
    g.scrambledWord=scramble(word);
    setInput(""); rerender(); startTimer();
  }, [startTimer]);

  const nextWord = useCallback(() => {
    const g = gsRef.current;
    const level = LEVELS[g.levelIdx];
    const nextWordIdx = g.wordIdx + 1;
    if (nextWordIdx >= level.words.length) {
      // Level complete
      stopTimer();
      play("levelup");
      setShowConfetti(true);
      setTimeout(()=>setShowConfetti(false),2000);
      setScreen("levelcomplete");
    } else {
      loadWord(g.levelIdx, nextWordIdx);
    }
  }, [play, stopTimer, loadWord]);

  useEffect(()=>{ nextWordRef.current=nextWord; },[nextWord]);

  const startGame = useCallback(() => {
    stopTimer();
    const g = gsRef.current;
    g.lives=3; g.score=0; g.flash=null;
    setScoreSaved(false); setPlayerName(""); setShowConfetti(false);
    setScreen("game");
    loadWord(0,0);
  }, [stopTimer, loadWord]);

  const handleNextLevel = useCallback(() => {
    const g = gsRef.current;
    const nextLevelIdx = g.levelIdx + 1;
    if (nextLevelIdx >= LEVELS.length) {
      play("win"); setScreen("win");
    } else {
      setShowConfetti(false);
      setScreen("game");
      loadWord(nextLevelIdx, 0);
    }
  }, [play, loadWord]);

  const handleSubmit = useCallback(() => {
    const g = gsRef.current;
    if (!input.trim()||g.flash||!g.running) return;
    const guess = input.trim().toUpperCase();
    const word = LEVELS[g.levelIdx].words[g.wordIdx].word;
    if (guess===word) {
      stopTimer(); g.running=false;
      const bonus = Math.ceil((g.timeLeft/TIMER)*10);
      g.score += 10 + bonus;
      g.flash="correct";
      play("correct");
      setShowConfetti(true);
      setTimeout(()=>setShowConfetti(false),1200);
      rerender();
      setTimeout(()=>nextWordRef.current&&nextWordRef.current(),1000);
    } else {
      g.lives-=1; g.flash="wrong"; play("wrong");
      setShake(true); rerender();
      setTimeout(()=>{ setShake(false); gsRef.current.flash=null; rerender(); },700);
      setInput("");
      if (g.lives<=0) { stopTimer(); play("gameover"); setTimeout(()=>setScreen("gameover"),800); }
    }
  }, [input, play, stopTimer]);

  const handleKeyDown = (e) => { if(e.key==="Enter") handleSubmit(); };

  const handleShareScore = () => {
    const g = gsRef.current;
    const text = `🧠 I scored ${g.score} pts on the GenLayer Anagram Challenge — made it to Level ${g.levelIdx+1}/20!\n\nCan you beat me? Play here 👇\nhttps://genlayer.com\n\n#GenLayer #Web3 #Blockchain`;
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, "_blank");
  };

  const fetchScores = useCallback(async () => {
    setScoresLoading(true);
    const s = await loadSharedScores();
    setScores(s);
    setScoresLoading(false);
  }, []);

  useEffect(() => { fetchScores(); }, [fetchScores]);

  const handleSaveScore = async () => {
    const g = gsRef.current;
    const fresh = await loadSharedScores();
    const entry = { name: playerName.trim()||"Anonymous", score: g.score, level: g.levelIdx+1, date: Date.now() };
    const updated = [...fresh, entry].sort((a,b)=>b.score-a.score);

    await saveSharedScores(updated);
    setScoreSaved(true);
  };

  useEffect(()=>()=>stopTimer(),[stopTimer]);

  // Derived
  const g = gsRef.current;
  const levelData = LEVELS[g.levelIdx] || LEVELS[0];

  // ── MENU ────────────────────────────────────────────────────────────────────
  if (screen==="menu") return (
    <div style={st.root}>
      {showLeaderboard && <LeaderboardModal scores={scores} loading={scoresLoading} onRefresh={fetchScores} onClose={()=>setShowLeaderboard(false)}/>}

        </div>
        <div style={{fontFamily:"'Fredoka One',cursive",fontSize:48,textAlign:"center",lineHeight:1,marginBottom:4}}>
          <span style={{color:"#f87171"}}>GEN</span><span style={{color:"#facc15"}}>LAYER</span>

        <button style={st.btnPrimary} onClick={startGame}>▶ Play Now</button>

            Learn more at <span style={{color:"#60a5fa"}}>genlayer.com</span>
          </a>
        </div>
      </div>
      <style>{CSS}</style>
    </div>
  );

  // ── LEVEL COMPLETE ───────────────────────────────────────────────────────────
  if (screen==="levelcomplete") return (

        <div style={{color:"#555",textAlign:"center",fontSize:12,marginBottom:6}}>{g.lives} ❤️ remaining</div>
        <div style={{textAlign:"center",marginBottom:20}}>
          <span style={{display:"inline-block",background:"linear-gradient(135deg,#facc15,#f59e0b)",color:"#12122a",fontFamily:"'Fredoka One',cursive",fontSize:12,padding:"3px 14px",borderRadius:99}}>🏆 GenLayer Master</span>
        </div>
        {!scoreSaved?(<>
          <div style={st.label}>Save your score to the global leaderboard</div>
          <input style={st.nameInput} placeholder="Your name..." value={playerName} onChange={e=>setPlayerName(e.target.value)} maxLength={18} onKeyDown={e=>e.key==="Enter"&&handleSaveScore()}/>

          padding:"20px 14px",borderRadius:16,marginBottom:14,minHeight:80,
          border:`2px solid ${g.flash==="correct"?"#4ade80":g.flash==="wrong"||g.flash==="timeout"?"#f87171":isFounderWord?"rgba(250,204,21,0.3)":"rgba(255,255,255,0.08)"}`,
          background:g.flash==="correct"?"rgba(74,222,128,0.07)":g.flash==="wrong"||g.flash==="timeout"?"rgba(248,113,113,0.07)":isFounderWord?"rgba(250,204,21,0.04)":"rgba(255,255,255,0.02)",
          animation:shake?"shakeX 0.6s ease":"none",
          transition:"border-color 0.3s, background 0.3s",
        }}>
          {g.scrambledWord.split("").map((ch,i)=>(
            <span key={`${g.levelIdx}-${g.wordIdx}-${i}`} style={{
              width:34,height:34,display:"flex",alignItems:"center",justifyContent:"center",
              borderRadius:8,color:"#fff",fontFamily:"'Fredoka One',cursive",fontSize:17,
              background:g.flash==="correct"?"#4ade80":g.flash==="wrong"||g.flash==="timeout"?"#f87171":isFounderWord?"#f59e0b":COLORS[i%6],
              boxShadow:"0 3px 8px rgba(0,0,0,0.35)",
              animation:`popIn 0.3s ${i*0.05}s ease both`,
              userSelect:"none",transition:"background 0.3s",
            }}>{ch}</span>
          ))}
        </div>

        {/* Feedback */}
        {g.flash==="correct"&&<div style={{textAlign:"center",color:"#4ade80",fontFamily:"'Fredoka One',cursive",fontSize:19,marginBottom:8,animation:"popIn 0.3s ease"}}>✓ Correct!</div>}
        {g.flash==="wrong"&&<div style={{textAlign:"center",color:"#f87171",fontFamily:"'Fredoka One',cursive",fontSize:15,marginBottom:8,animation:"popIn 0.3s ease"}}>✗ Wrong! {g.lives} {g.lives===1?"life":"lives"} left</div>}
        {g.flash==="timeout"&&<div style={{textAlign:"center",color:"#f87171",fontFamily:"'Fredoka One',cursive",fontSize:14,marginBottom:8,animation:"popIn 0.3s ease"}}>⏰ Time's up! Answer: <strong>{wordData.word}</strong></div>}

        {/* Hint */}
        <div style={{minHeight:42,marginBottom:10}}>
          {g.hintVisible
            ?<div style={{background:isFounderWord?"rgba(250,204,21,0.08)":"rgba(96,165,250,0.07)",border:`1px solid ${isFounderWord?"rgba(250,204,21,0.25)":"rgba(96,165,250,0.2)"}`,borderRadius:10,padding:"9px 13px",color:isFounderWord?"#facc15":"#93c5fd",fontSize:13,lineHeight:1.5}}>
              💡 {wordData.hint} <span style={{color:"#f87171",fontSize:11,marginLeft:5}}>⚡ 2× speed</span>
            </div>
            :<button style={st.hintBtn} onClick={()=>{gsRef.current.hintVisible=true;rerender();}}>
              Show Hint <span style={{color:"#f87171",fontSize:11}}>⚡ speeds up timer</span>
            </button>
          }
        </div>

        {/* Input */}
        {!g.flash&&(
          <div style={{display:"flex",gap:8}}>
            <input style={st.input} value={input} autoFocus maxLength={25}
              placeholder="Type your answer..."
              onChange={e=>setInput(e.target.value.toUpperCase())}
              onKeyDown={handleKeyDown}
            />
            <button style={st.btnSubmit} onClick={handleSubmit}>Go!</button>
          </div>
        )}
      </div>
      <style>{CSS}</style>
    </div>
  );
}

// ─── STYLES ───────────────────────────────────────────────────────────────────
const st = {
  root:{minHeight:"100vh",background:"linear-gradient(135deg,#0c0a1e 0%,#12112a 100%)",display:"flex",alignItems:"flex-start",justifyContent:"center",fontFamily:"'Nunito',sans-serif",padding:"16px",overflowY:"auto"},
  card:{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.09)",borderRadius:24,padding:"28px 22px",width:"100%",maxWidth:460,boxShadow:"0 24px 60px rgba(0,0,0,0.55)",margin:"auto"},
  label:{color:"#888",fontSize:12,letterSpacing:1,textTransform:"uppercase",marginBottom:10},
  btnPrimary:{width:"100%",padding:"13px",borderRadius:13,background:"linear-gradient(135deg,#f87171,#fb923c)",border:"none",color:"#fff",fontFamily:"'Fredoka One',cursive",fontSize:19,cursor:"pointer",marginBottom:10,boxShadow:"0 4px 18px rgba(248,113,113,0.35)"},
  btnGhost:{width:"100%",padding:"11px",borderRadius:13,background:"transparent",border:"1px solid rgba(255,255,255,0.1)",color:"#666",fontFamily:"'Fredoka One',cursive",fontSize:16,cursor:"pointer",marginBottom:8},
  hintBtn:{background:"transparent",border:"1px dashed rgba(255,255,255,0.12)",borderRadius:10,padding:"9px 16px",color:"#555",cursor:"pointer",fontFamily:"'Nunito',sans-serif",fontSize:13},
  input:{flex:1,background:"rgba(255,255,255,0.05)",border:"2px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"12px 14px",color:"#fff",fontSize:17,fontFamily:"'Fredoka One',cursive",letterSpacing:2,outline:"none"},
  btnSubmit:{padding:"12px 18px",borderRadius:12,background:"linear-gradient(135deg,#60a5fa,#818cf8)",border:"none",color:"#fff",fontFamily:"'Fredoka One',cursive",fontSize:17,cursor:"pointer",boxShadow:"0 4px 12px rgba(96,165,250,0.3)"},
  nameInput:{width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.05)",border:"2px solid rgba(255,255,255,0.1)",borderRadius:12,padding:"12px 14px",color:"#fff",fontSize:15,fontFamily:"'Nunito',sans-serif",outline:"none",marginBottom:10},
};

const CSS = `
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700&display=swap');
  @keyframes popIn{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
  @keyframes shakeX{0%,100%{transform:translateX(0)}20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}
  @keyframes confettiFall{0%{opacity:1;transform:translateY(0) rotate(0deg)}100%{opacity:0;transform:translateY(100vh) rotate(720deg)}}
  * { box-sizing: border-box; }
  body { margin: 0; padding: 0; }
  input { -webkit-appearance: none; }
  button:active { transform: scale(0.97); }
  @media (max-width: 480px) {
    input { font-size: 16px !important; }
  }
`;

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
